<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Upward trending jagged stock line -->
  <polyline
    points="3,27 7,21 11,24 16,14 20,18 29,5"
    fill="none"
    stroke="#10b981"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Arrow head at top-right -->
  <polyline
    points="22,5 29,5 29,12"
    fill="none"
    stroke="#10b981"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
