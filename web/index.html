<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div>
                <h1 class="gradient-text">Market Insights Dashboard</h1>
                <p class="subtitle">Real-time Tracker with Cap Indices & Sectors</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="search-container">
                    <input type="text" id="symbol-search" class="glass-input" placeholder="Search to add (e.g. TCS)"
                        autocomplete="off">
                    <div id="search-results" class="search-dropdown"></div>
                </div>
                <button id="refresh-btn" class="glass-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 21v-5h5" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="glass-panel">
            <div class="market-status-bar" id="market-status-bar">
                <!-- Status badges injected here -->
            </div>

            <div class="main-tabs-container" id="main-tabs-container">
                <!-- Main tabs -->
            </div>
            <div class="sub-tabs-container" id="sub-tabs-container">
                <!-- Sub tabs -->
            </div>

            <!-- Shown only on Mutual Funds > Fund House sub-tab -->
            <div id="mf-controls" class="mf-controls-bar">
                <span class="mf-label">Fund House</span>
                <select id="amc-select" class="glass-select">
                    <option value="">Select a fund house...</option>
                </select>
            </div>

            <div class="table-container">
                <div class="loading-overlay" id="loading-overlay">
                    <div class="spinner"></div>
                    <p>Fetching Real-Time Market Quotes...</p>
                </div>
                <table class="market-table">
                    <thead id="table-head">
                        <tr>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th class="right-align">Price</th>
                            <th class="right-align">Change</th>
                            <th class="right-align">52W H</th>
                            <th class="right-align">52W L</th>
                            <th class="right-align">Δ 52W H</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>

            <div id="overview-extras" class="overview-extras">
                <div class="collapsible-section">
                    <div class="collapsible-header" onclick="toggleSection('news-section-body')">
                        <div class="collapsible-title-group">
                            <h2>Breaking Market News</h2>
                            <span class="live-indicator">LIVE</span>
                        </div>
                        <span class="chevron" id="chevron-news-section-body">▾</span>
                    </div>
                    <div class="collapsible-body open" id="news-section-body">
                        <div id="breaking-news-content" class="collapsible-content">
                            <!-- News items -->
                        </div>
                    </div>
                </div>

                <div class="collapsible-section">
                    <div class="collapsible-header" onclick="toggleSection('events-section-body')">
                        <div class="collapsible-title-group">
                            <h2>Upcoming Events</h2>
                        </div>
                        <span class="chevron" id="chevron-events-section-body">▾</span>
                    </div>
                    <div class="collapsible-body open" id="events-section-body">
                        <div id="calendar-content" class="collapsible-content">
                            <!-- Calendar items -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
