<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSE / NSE - Market Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div>
                <h1 class="gradient-text">Market Dashboard</h1>
                <p class="subtitle">Real-time Tracker with Cap Indices & Sectors</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="search-container">
                    <input type="text" id="symbol-search" class="glass-input" placeholder="Search to add (e.g. TCS)"
                        autocomplete="off">
                    <div id="search-results" class="search-dropdown"></div>
                </div>
                <button id="refresh-btn" class="glass-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 21v-5h5" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="glass-panel">
            <div class="main-tabs-container" id="main-tabs-container">
                <!-- Main tabs -->
            </div>
            <div class="sub-tabs-container" id="sub-tabs-container">
                <!-- Sub tabs -->
            </div>

            <div class="table-container">
                <div class="loading-overlay" id="loading-overlay">
                    <div class="spinner"></div>
                    <p>Fetching Real-Time Market Quotes...</p>
                </div>
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th class="right-align">Price (₹)</th>
                            <th class="right-align">Change</th>
                            <th class="right-align">% Change</th>
                            <th class="right-align">52W High</th>
                            <th class="right-align">52W Low</th>
                            <th class="right-align">Δ 52W High</th>
                            <th></th> <!-- For delete button -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
