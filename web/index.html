<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f172a'/%3E%3Cpolyline points='3,27 7,21 11,24 16,14 20,18 29,5' fill='none' stroke='%2310b981' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpolyline points='22,5 29,5 29,12' fill='none' stroke='%2310b981' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Market Insights">
    <link rel="stylesheet" href="style.css">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div>
                <h1 class="gradient-text">Market Insights</h1>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <span id="last-updated" class="last-updated-label"></span>
                <div class="search-container">
                    <input type="text" id="symbol-search" class="glass-input" placeholder="Search to add (e.g. TCS)"
                        autocomplete="off">
                    <div id="search-results" class="search-dropdown"></div>
                </div>
                <button id="refresh-btn" class="glass-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 21v-5h5" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="glass-panel">
            <div class="market-status-bar" id="market-status-bar">
                <!-- Status badges injected here -->
            </div>

            <div class="main-tabs-container" id="main-tabs-container">
                <!-- Main tabs -->
            </div>
            <div class="sub-tabs-container" id="sub-tabs-container">
                <!-- Sub tabs -->
            </div>

            <!-- Shown only on Mutual Funds > Fund House sub-tab -->
            <div id="mf-controls" class="mf-controls-bar">
                <span class="mf-label">Fund House</span>
                <select id="amc-select" class="glass-select">
                    <option value="">Select a fund house...</option>
                </select>
            </div>

            <div id="portfolio-content" class="portfolio-content"></div>
            <div id="market-context-content" class="mc-content"></div>

            <div class="table-container">
                <div class="loading-overlay" id="loading-overlay">
                    <div class="spinner"></div>
                    <p>Fetching Real-Time Market Quotes...</p>
                </div>
                <table class="market-table">
                    <thead id="table-head">
                        <tr>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th class="right-align">Price</th>
                            <th class="right-align">Change</th>
                            <th class="right-align">52W H</th>
                            <th class="right-align">52W L</th>
                            <th class="right-align">Δ 52W H</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>

            <div id="overview-extras" class="overview-extras">
                <div class="collapsible-section">
                    <div class="collapsible-header" onclick="toggleSection('news-section-body')">
                        <div class="collapsible-title-group">
                            <h2>Breaking Market News</h2>
                            <span class="live-indicator">LIVE</span>
                        </div>
                        <span class="chevron" id="chevron-news-section-body">▾</span>
                    </div>
                    <div class="collapsible-body open" id="news-section-body">
                        <div id="breaking-news-content" class="collapsible-content">
                            <!-- News items -->
                        </div>
                    </div>
                </div>

                <div class="collapsible-section">
                    <div class="collapsible-header" onclick="toggleSection('live-tv-body')">
                        <div class="collapsible-title-group">
                            <h2>Live TV</h2>
                            <span class="live-indicator">LIVE</span>
                        </div>
                        <span class="chevron" id="chevron-live-tv-body">▾</span>
                    </div>
                    <div class="collapsible-body open" id="live-tv-body">
                        <div class="collapsible-content">
                            <div class="live-tv-controls">
                                <div class="live-tv-channel-pills" id="live-tv-channel-pills"></div>
                            </div>
                            <div class="live-tv-embed-container">
                                <div class="live-tv-placeholder" id="live-tv-placeholder">▶ Select a channel above to start watching</div>
                                <iframe id="live-tv-iframe" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ETF Compare Bar -->
    <div id="etf-compare-bar" class="mf-compare-bar" style="display:none;">
        <span id="etf-compare-count"></span>
        <button id="etf-compare-btn">Compare</button>
        <button id="etf-compare-clear">✕ Clear</button>
    </div>

    <!-- ETF Compare Modal -->
    <div id="etf-compare-modal" class="mf-compare-modal" style="display:none;">
        <div class="etf-compare-backdrop"></div>
        <div class="mf-compare-dialog">
            <div class="mf-compare-dialog-header">
                <h2>ETF Comparison</h2>
                <button id="etf-compare-close">✕</button>
            </div>
            <div class="mf-compare-dialog-body" id="etf-compare-dialog-body"></div>
        </div>
    </div>

    <!-- MF Compare Bar -->
    <div id="mf-compare-bar" class="mf-compare-bar" style="display:none;">
        <span id="mf-compare-count"></span>
        <button id="mf-compare-btn">Compare</button>
        <button id="mf-compare-clear">✕ Clear</button>
    </div>

    <!-- MF Compare Modal -->
    <div id="mf-compare-modal" class="mf-compare-modal" style="display:none;">
        <div class="mf-compare-backdrop"></div>
        <div class="mf-compare-dialog">
            <div class="mf-compare-dialog-header">
                <h2>Fund Comparison</h2>
                <button id="mf-compare-close">✕</button>
            </div>
            <div class="mf-compare-dialog-body" id="mf-compare-dialog-body"></div>
        </div>
    </div>

    <!-- Candle Chart Modal -->
    <div id="candle-modal" style="display:none;">
        <div class="candle-modal-backdrop" onclick="closeCandleModal()"></div>
        <div class="candle-modal-dialog">
            <div class="candle-modal-header">
                <div class="candle-modal-title">
                    <span id="candle-modal-symbol"></span>
                    <span id="candle-modal-price"></span>
                </div>
                <button class="candle-modal-close-btn" onclick="closeCandleModal()">✕</button>
            </div>
            <div class="candle-modal-controls">
                <div id="candle-range-btns" class="range-selector"></div>
                <div id="candle-interval-btns" class="range-selector candle-interval-row"></div>
            </div>
            <div id="candle-modal-loading" class="chart-loading" style="display:none;">
                <div class="spinner" style="width:24px;height:24px;margin-right:10px;margin-bottom:0;"></div>
                Loading...
            </div>
            <div class="candle-modal-chart-wrap">
                <canvas id="candle-modal-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Ticker Chart Modal -->
    <div id="ticker-modal" style="display:none;">
        <div class="candle-modal-backdrop" onclick="closeTickerModal()"></div>
        <div class="candle-modal-dialog">
            <div class="candle-modal-header">
                <div class="candle-modal-title">
                    <span id="ticker-modal-symbol"></span>
                    <span id="ticker-modal-price"></span>
                </div>
                <button class="candle-modal-close-btn" onclick="closeTickerModal()">✕</button>
            </div>
            <div id="ticker-modal-chart-body" class="ticker-modal-chart-body">
                <!-- range selector + loading + canvas injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
